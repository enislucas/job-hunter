<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8fc2ff"/>
      <stop offset="50%" stop-color="#3d7dff"/>
      <stop offset="100%" stop-color="#1440c0"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a5fe8" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#1a3fb8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a3fb8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- blue aura, no background plate: true transparency at the corners -->
  <circle cx="128" cy="128" r="124" fill="url(#aura)"/>

  <!-- faint echo hexagon for depth -->
  <path d="M128 22 L216 74 L216 182 L128 234 L40 182 L40 74 Z"
        fill="none" stroke="#3f7fff" stroke-opacity="0.18" stroke-width="3" stroke-linejoin="round"/>

  <!-- main hexagon -->
  <g filter="url(#glow)">
    <path d="M128 38 L202 82 L202 174 L128 218 L54 174 L54 82 Z"
          fill="none" stroke="url(#steel)" stroke-width="9" stroke-linejoin="round"/>
  </g>

  <!-- crosshair -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="38" fill="none" stroke="url(#steel)" stroke-width="6.5"/>
    <circle cx="128" cy="128" r="10.5" fill="url(#steel)"/>
    <line x1="128" y1="74"  x2="128" y2="98"  stroke="url(#steel)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="128" y1="158" x2="128" y2="182" stroke="url(#steel)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="74"  y1="128" x2="98"  y2="128" stroke="url(#steel)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="158" y1="128" x2="182" y2="128" stroke="url(#steel)" stroke-width="6.5" stroke-linecap="round"/>
  </g>

  <!-- two quiet accents, same family -->
  <circle cx="202" cy="82"  r="6.5" fill="#9fd0ff"/>
  <circle cx="54"  cy="174" r="6.5" fill="#2a5fe8"/>
</svg>
