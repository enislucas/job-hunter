<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a8fff"/>
      <stop offset="55%" stop-color="#b06bff"/>
      <stop offset="100%" stop-color="#e068ff"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#04060a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <rect width="256" height="256" rx="52" fill="none" stroke="#1c2740" stroke-width="2"/>
  <!-- hexagon -->
  <g filter="url(#glow)">
    <path d="M128 34 L206 79 L206 169 L128 214 L50 169 L50 79 Z"
          fill="none" stroke="url(#g)" stroke-width="11" stroke-linejoin="round"/>
  </g>
  <!-- crosshair target -->
  <g filter="url(#glow)">
    <circle cx="128" cy="124" r="40" fill="none" stroke="url(#g)" stroke-width="8"/>
    <circle cx="128" cy="124" r="13" fill="url(#g)"/>
    <line x1="128" y1="66" x2="128" y2="92" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
    <line x1="128" y1="156" x2="128" y2="182" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
    <line x1="70" y1="124" x2="96" y2="124" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
    <line x1="160" y1="124" x2="186" y2="124" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- vertex nodes -->
  <circle cx="206" cy="79" r="9" fill="#7cd99e"/>
  <circle cx="50" cy="169" r="9" fill="#4a8fff"/>
  <circle cx="128" cy="214" r="9" fill="#e068ff"/>
</svg>
